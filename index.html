<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="./manifest.json">
    <title>Finance Tracker - Premium App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
            --text-main: #f8fafc; /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --accent-primary: #3b82f6; /* Blue 500 */
            --accent-success: #10b981; /* Emerald 500 */
            --accent-danger: #ef4444; /* Red 500 */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: flex-start;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 1.5rem; font-weight: 600; letter-spacing: -0.5px; }

        /* Dashboard Overview */
        .dashboard-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; }
        .balance-box { flex-grow: 1; }
        .balance-title { font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 3rem; font-weight: 700; margin-top: 0.5rem; }

        .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
        .summary-item { padding: 1.5rem; border-radius: 15px; border: 1px solid var(--glass-border); }
        .summary-item.income { background: linear-gradient(135deg, rgba(16,185,129,0.1), transparent); border-left: 4px solid var(--accent-success); }
        .summary-item.expense { background: linear-gradient(135deg, rgba(239,68,68,0.1), transparent); border-left: 4px solid var(--accent-danger); }

        .summary-label { font-size: 0.9rem; color: var(--text-muted); }
        .summary-value.income-val { color: var(--accent-success); font-size: 1.5rem; font-weight: 600; margin-top: 0.5rem; }
        .summary-value.expense-val { color: var(--accent-danger); font-size: 1.5rem; font-weight: 600; margin-top: 0.5rem; }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-muted); }
        input, select {
            width: 100%; padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent-primary); }
        
        button {
            width: 100%; padding: 0.8rem; margin-top: 1rem;
            background: var(--accent-primary); color: white; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* History List & Tabs */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .history-header h2 { margin-bottom: 0; }
        .filter-tabs { display: flex; gap: 0.5rem; background: rgba(15,23,42,0.6); padding: 0.4rem; border-radius: 8px; }
        .filter-tabs button { 
            margin: 0; padding: 0.4rem 1rem; background: transparent; width: auto; 
            font-size: 0.85rem; font-weight: 500; border-radius: 6px; color: var(--text-muted);
        }
        .filter-tabs button.active { background: var(--accent-primary); color: white; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .filter-tabs button:hover:not(.active) { background: rgba(255,255,255,0.1); transform: none; box-shadow: none; }

        .history-list { list-style: none; max-height: 350px; overflow-y: auto; padding-right: 10px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; border-bottom: 1px solid var(--glass-border); transition: 0.2s;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); border-radius: 8px; }
        .item-info { display: flex; flex-direction: column; }
        .item-desc { font-weight: 600; }
        .item-cat { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
        .item-amount { font-weight: 600; }
        .list-plus .item-amount { color: var(--accent-success); }
        .list-minus .item-amount { color: var(--accent-danger); }
        
        .delete-btn {
            background: transparent; color: var(--text-muted); padding: 0; width: auto;
            margin: 0 0 0 1rem; font-size: 1.2rem; transition: 0.2s;
            cursor: pointer;
        }
        .delete-btn:hover { color: var(--accent-danger); background: transparent; transform: none; box-shadow: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .chart-container { width: 100%; max-width: 300px; margin: 0 auto 2rem auto; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; padding: 1rem; }
            .dashboard-header { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Overview Section -->
        <div class="glass-card left-panel">
            <div class="balance-box">
                <div class="balance-title">Tổng Số Dư</div>
                <div class="balance-amount" id="balance">0 ₫</div>
            </div>
            
            <div class="summary-cards">
                <div class="summary-item income">
                    <div class="summary-label">Thu Nhập</div>
                    <div class="summary-value income-val" id="income">+0 ₫</div>
                </div>
                <div class="summary-item expense">
                    <div class="summary-label">Đã Chi</div>
                    <div class="summary-value expense-val" id="expense">-0 ₫</div>
                </div>
            </div>

            <!-- Chart -->
            <h2 style="margin-top: 2rem; text-align: center; font-size: 1.2rem;">Phân Tích Chi Tiêu</h2>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="right-panel">
            <div class="glass-card" style="margin-bottom: 2rem;">
                <h2>Thêm Giao Dịch</h2>
                <form id="form">
                    <div class="form-group">
                        <label for="text">Tên Giao Dịch</label>
                        <input type="text" id="text" placeholder="Vd: Tiền lương, Cà phê..." required>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="amount">Số Tiền (₫)</label>
                            <input type="number" id="amount" placeholder="Nhập số tiền..." required>
                        </div>
                        <div class="form-group">
                            <label for="type">Loại</label>
                            <select id="type">
                                <option value="expense">Chi Tiêu (-)</option>
                                <option value="income">Thu Nhập (+)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="category">Danh Mục (Dành cho Chi Tiêu)</label>
                        <select id="category">
                            <option value="Khác">Khác</option>
                            <option value="Ăn uống">Ăn uống</option>
                            <option value="Mua sắm">Mua sắm</option>
                            <option value="Sức khỏe">Sức khỏe</option>
                            <option value="Giải trí">Giải trí</option>
                            <option value="Hóa đơn">Hóa đơn</option>
                        </select>
                    </div>

                    <button type="submit">Lưu Giao Dịch</button>
                    <button type="button" onclick="exportToCSV()" style="background: var(--accent-success); margin-top: 0.8rem;">Tải Báo Cáo Excel (CSV)</button>
                </form>
            </div>

            <div class="glass-card">
                <div class="history-header">
                    <h2>Lịch Sử Của Bạn</h2>
                    <div class="filter-tabs" id="filterTabs">
                        <button class="active" onclick="setFilter('all', this)">Tất cả</button>
                        <button onclick="setFilter('income', this)">Thu</button>
                        <button onclick="setFilter('expense', this)">Chi</button>
                    </div>
                </div>
                <ul class="history-list" id="list">
                    <!-- Javascript Data -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        const balance = document.getElementById('balance');
        const income = document.getElementById('income');
        const expense = document.getElementById('expense');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');
        const typeSelect = document.getElementById('type');
        const categorySelect = document.getElementById('category');

        let expenseChart;
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const chartColors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#8b5cf6', '#64748b'];

        // Core Requirement: Nâng cấp dữ liệu - Tải dữ liệu từ LocalStorage
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        let currentFilter = 'all';

        function formatMoney(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " ₫";
        }

        function addTransaction(e) {
            e.preventDefault();
            
            let amt = parseInt(amount.value);
            const transAmount = typeSelect.value === 'expense' ? -Math.abs(amt) : Math.abs(amt);
            const transCategory = typeSelect.value === 'income' ? 'Thu Nhập' : categorySelect.value;
            
            const trans = {
                id: generateID(),
                text: text.value,
                amount: transAmount,
                category: transCategory
            };

            transactions.push(trans);
            
            updateValues();
            updateLocalStorage();
            updateChart();
            renderList();

            text.value = '';
            amount.value = '';
        }

        function generateID() {
            return Math.floor(Math.random() * 100000000);
        }

        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            item.classList.add('history-item', transaction.amount < 0 ? 'list-minus' : 'list-plus');

            item.innerHTML = `
                <div class="item-info">
                    <span class="item-desc">${transaction.text}</span>
                    <span class="item-cat">${transaction.category}</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <span class="item-amount">${sign}${formatMoney(Math.abs(transaction.amount))}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">×</button>
                </div>
            `;
            list.appendChild(item);
        }

        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0);
            
            const inc = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0);
            const exp = amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1;

            balance.innerText = formatMoney(total);
            income.innerText = "+" + formatMoney(inc);
            expense.innerText = "-" + formatMoney(exp);
        }

        // Logic Xóa 
        window.removeTransaction = function(id) {
            transactions = transactions.filter(transaction => transaction.id !== id);
            updateLocalStorage();
            updateValues();
            updateChart();
            renderList(); 
        }

        // Feature: Lọc dữ liệu qua Tabs
        window.setFilter = function(filterType, element) {
            currentFilter = filterType;
            
            const buttons = document.querySelectorAll('#filterTabs button');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            renderList();
        }

        function renderList() {
            list.innerHTML = '';
            let filtered = transactions;
            if (currentFilter === 'income') filtered = transactions.filter(t => t.amount > 0);
            if (currentFilter === 'expense') filtered = transactions.filter(t => t.amount < 0);
            
            filtered.forEach(addTransactionDOM);
        }

        // Feature: Dữ liệu tự động nâng cấp đồng bộ vào LocalStorage
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // TÍNH NĂNG MỚI: XUẤT CSV
        window.exportToCSV = function() {
            if (transactions.length === 0) {
                alert("Chưa có dữ liệu để xuất!");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "ID,Tên Giao Dịch,Số Tiền,Loại,Danh Mục\r\n";
            transactions.forEach(row => {
                let typeStr = row.amount > 0 ? "Thu Nhập" : "Chi Tiêu";
                csvContent += `${row.id},"${row.text}",${row.amount},${typeStr},${row.category}\r\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.href = encodedUri;
            link.download = "bao_cao_tai_chinh.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function updateChart() {
            const expensesList = transactions.filter(t => t.amount < 0);
            const categoriesObj = {};

            expensesList.forEach(t => {
                categoriesObj[t.category] = (categoriesObj[t.category] || 0) + Math.abs(t.amount);
            });

            const labels = Object.keys(categoriesObj);
            const data = Object.values(categoriesObj);

            if(expenseChart) {
                expenseChart.destroy();
            }

            if(labels.length === 0) {
                if(expenseChart) expenseChart.clear();
                return;
            };

            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: chartColors,
                        borderColor: '#1e293b',
                        borderWidth: 2,
                    }]
                },
                options: {
                    cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#f8fafc', font: {family: 'Inter'} } }
                    }
                }
            });
        }

        function init() {
            renderList();
            updateValues();
            updateChart();
        }

        init();
        form.addEventListener('submit', addTransaction);

        // Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker đăng ký thành công.', reg))
                    .catch(err => console.log('Lỗi Service Worker:', err));
            });
        }
    </script>
</body>
</html>
